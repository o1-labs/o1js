name: Build o1js
description: 'All of the building steps for o1js'

permissions:
  contents: write

inputs:
  proof_systems_commit:
    description: 'proof_systems commit to use'
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    - uses: nixbuild/nix-quick-install-action@v30
      with:
        nix_conf: |
          keep-env-derivations = true
          keep-outputs = true
          extra-substituters = https://storage.googleapis.com/mina-nix-cache
          extra-trusted-public-keys = nix-cache.minaprotocol.org:fdcuDzmnM0Kbf7yU4yywBuUEJWClySc1WIF6t6Mm8h4= nix-cache.minaprotocol.org:D3B1W+V7ND1Fmfii8EhbAbF1JXoe2Ct4N34OKChwk2c= mina-nix-cache-1:djtioLfv2oxuK2lqPUgmZbf8bY8sK/BnYZCU2iU5Q10=
    - name: Disable smudging
      shell: bash
      run: echo "GIT_LFS_SKIP_SMUDGE=1" >> $GITHUB_ENV
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: use proof_systems_commit if provided
      if: ${{ github.event.inputs.proof_systems_commit != '' }}
      shell: bash
      run: |
        git -C src/mina/src/lib/crypto/proof-systems fetch origin ${{ github.event.inputs.proof_systems_commit }}
        git -C src/mina/src/lib/crypto/proof-systems checkout ${{ github.event.inputs.proof_systems_commit }}
        git -C src/mina add src/lib/crypto/proof-systems
    - name: cache bindings
      uses: actions/cache@v4
      id: bindings-cache
      with:
        path: |
          src/bindings/compiled
          src/bindings/mina-transaction/gen
        key: bindings-${{ github.event.pull_request.head.sha || github.sha }}-${{ inputs.proof_systems_commit }}

    - name: Build the o1js bindings
      if: steps.bindings-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -Eeu
        ./pin.sh
        nix build o1js#bindings --accept-flake-config
        nix run o1js#generate-bindings --accept-flake-config

    - name: Cache dependencies and build
      uses: actions/cache@v4
      id: cache
      with:
        path: |
          ~/.npm
          node_modules
          dist
        key: ${{ runner.OS }}-node-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.js') }}

    - name: Build examples
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        npm ci
        npm run build:examples
    - name: Build o1js clean
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        rm -fr dist
        npm ci
        npm run build

    - name: Cache repository
      uses: actions/cache@v4
      with:
        path: .
        key: repo-${{ github.sha }}


name: Jobs for new commits on main (and similar branches)
on:
  workflow_run:
    workflows: ["checks"]
    types:
      - completed
    branches:
      - main
      - v1
      - v2
      - v3

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Build-Doc:
    strategy:
      matrix:
        node: [20]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.JS ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Run typedoc
        run: |
          GIT_LFS_SKIP_SMUDGE=1 git submodule update --init --recursive
          npm ci
          npx typedoc --tsconfig tsconfig.node.json src/index.ts
      - name: Deploy
        uses: peaceiris/actions-gh-pages@373f7f263a76c20808c831209c920827a82a2847
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs


  Auto-merge:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags

      - name: Configure Git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Try to merge main into version-next
        run: |
          git checkout version-next
          git merge origin/main
          git push origin version-next
        continue-on-error: true

      - name: Create Pull Request if merge failed
        if: failure()
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto-merge-main-to-version-next-${{ github.sha }}
          title: 'Auto-merge main to version-next (commit ${{ github.sha }})'
          body: 'This PR was automatically created to merge changes from main into version-next. Please resolve conflicts and merge manually.'
          base: version-next


  Pkg-pr-new:
    runs-on: [ubuntu-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: release-pkg-pr-version
        uses: ./.github/actions/release-pkg-pr-version

  # Detect whether the root package version on this commit differs from what is
  # currently published on npm. Native is expensive to build, so we only run
  # the native release pipeline when the version actually changed.
  #
  # Gated on the upstream `checks` workflow having succeeded. If checks failed,
  # all release jobs cascade-skip via `needs:`.
  Check-Version-Change:
    if: |
      github.ref == 'refs/heads/main' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
      version: ${{ steps.diff.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Compare local vs published version
        id: diff
        run: |
          set -euo pipefail
          LOCAL=$(jq -r .version package.json)
          # Default REMOTE to LOCAL so a registry hiccup is treated as
          # "no change" (fail closed: skip release rather than risk a bad publish).
          REMOTE=$(npm view o1js version 2>/dev/null || echo "$LOCAL")
          echo "local=$LOCAL remote=$REMOTE"
          echo "version=$LOCAL" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Verify @o1js/native versions are in sync with o1js version
        if: steps.diff.outputs.changed == 'true'
        run: node scripts/check-version-sync.mjs

  Release-Native:
    needs: Check-Version-Change
    if: needs.Check-Version-Change.outputs.changed == 'true'
    uses: ./.github/workflows/publish_native.yml
    with:
      npm-tag: latest
    permissions:
      contents: read
      id-token: write
    secrets: inherit

  Release-on-NPM:
    # Runs only when the version changed. Native must publish first because
    # o1js lists @o1js/native as an optionalDependency at the same version;
    # if Release-Native fails or is skipped, the default `needs:` cascade
    # skips this job too — exactly what we want.
    needs: [Check-Version-Change, Release-Native]
    if: needs.Check-Version-Change.outputs.changed == 'true'
    timeout-minutes: 180
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # Required for OIDC trusted publishing
    steps:
      - name: Restore repository
        uses: actions/cache@v4
        with:
          path: .
          key: repo-${{ github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Node 24 includes npm 11.5+ required for OIDC
          registry-url: 'https://registry.npmjs.org'

      - name: Verify @o1js/native versions are in sync with o1js version
        run: node scripts/check-version-sync.mjs

      - name: Build o1js
        run: |
          npm ci
          npm run prepublish:full

      - name: Publish to NPM if version has changed
        id: publish
        uses: JS-DevTools/npm-publish@v4
        with:
          strategy: upgrade

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Tag new version
        if: ${{ steps.publish.outputs.type }} # https://github.com/JS-DevTools/npm-publish?tab=readme-ov-file#action-output
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASED_VERSION: ${{ steps.publish.outputs.version }}
        run: |
          git tag $RELEASED_VERSION
          git push origin $RELEASED_VERSION
      - name: Create Release
        uses: ncipollo/release-action@bcfe5470707e8832e12347755757cec0eb3c22af
        if: success()
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.publish.outputs.version }}
          generateReleaseNotes: true
          name: Release ${{ steps.publish.outputs.version }}
          skipIfReleaseExists: true
